openapi: 3.0.3
info:
  title: MoWizz API
  version: 1.5.0
  description: OpenAPI documentation for current MoWizz server endpoints.
servers:
  - url: http://localhost:8080
tags:
  - name: Movies
    description: Movie discovery endpoints backed by TMDB
  - name: TV Shows
    description: TV show discovery endpoints backed by TMDB
  - name: Search
    description: Cross-media TMDB search endpoints
  - name: Users
    description: User management endpoints
  - name: User Media
    description: Endpoints for saving user-linked movies and TV shows
paths:
  /movies/{tmdbId}:
    get:
      tags: [Movies]
      operationId: getMovieByTmdbId
      summary: Get movie details by TMDB id
      parameters:
        - in: path
          name: tmdbId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Movie found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
        "404":
          description: Movie not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: TMDB service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /movies/{tmdbId}/trailer:
    get:
      tags: [Movies]
      operationId: getMovieTrailer
      summary: Get the official trailer for a movie
      description: Returns the first official trailer of type "Trailer" from TMDB for the given movie. Only YouTube results are returned by TMDB.
      parameters:
        - in: path
          name: tmdbId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Trailer found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trailer"
              example:
                key: b9EkMc79ZSU
                name: Official Trailer
                site: YouTube
        "404":
          description: No trailer found for this movie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: TMDB service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /movies/popular:
    get:
      tags: [Movies]
      operationId: getPopularMovies
      summary: Get popular movies
      responses:
        "200":
          description: Popular movies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Movie"
        "503":
          description: TMDB service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /movies/top-rated:
    get:
      tags: [Movies]
      operationId: getTopRatedMovies
      summary: Get top rated movies
      responses:
        "200":
          description: Top rated movies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Movie"
        "503":
          description: TMDB service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /movies/upcoming:
    get:
      tags: [Movies]
      operationId: getUpcomingMovies
      summary: Get upcoming movies
      responses:
        "200":
          description: Upcoming movies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Movie"
        "503":
          description: TMDB service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shows/{tmdbId}:
    get:
      tags: [TV Shows]
      operationId: getTvShowByTmdbId
      summary: Get TV show details by TMDB id
      parameters:
        - in: path
          name: tmdbId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: TV show found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TvShow"
        "404":
          description: TV show not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: TMDB service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shows/{tmdbId}/trailer:
    get:
      tags: [TV Shows]
      operationId: getTvShowTrailer
      summary: Get the official trailer for a TV show
      description: Returns the first official trailer of type "Trailer" from TMDB for the given TV show. Only YouTube results are returned by TMDB.
      parameters:
        - in: path
          name: tmdbId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Trailer found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trailer"
              example:
                key: b9EkMc79ZSU
                name: Season 1 Official Final Trailer
                site: YouTube
        "404":
          description: No trailer found for this TV show
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: TMDB service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shows/popular:
    get:
      tags: [TV Shows]
      operationId: getPopularTvShows
      summary: Get popular TV shows
      responses:
        "200":
          description: Popular TV shows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TvShow"
        "503":
          description: TMDB service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shows/top-rated:
    get:
      tags: [TV Shows]
      operationId: getTopRatedTvShows
      summary: Get top rated TV shows
      responses:
        "200":
          description: Top rated TV shows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TvShow"
        "503":
          description: TMDB service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /search/multi:
    get:
      tags: [Search]
      operationId: multiSearch
      summary: Multi search across TMDB media types
      description: Returns movie and TV show results discriminated by mediaType.
      parameters:
        - in: query
          name: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchResult"
        "503":
          description: TMDB service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    post:
      tags: [Users]
      operationId: createUser
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "200":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    get:
      tags: [Users]
      operationId: listUsers
      summary: List all users
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      tags: [Users]
      operationId: getUserById
      summary: Get a user by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Users]
      operationId: deleteUserById
      summary: Delete a user by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: User deleted

  /users/{user_id}/media:
    post:
      tags: [User Media]
      operationId: saveMediaForUser
      summary: Save movie or TV show media for a user
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserMediaRequest"
      responses:
        "200":
          description: User media entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMedia"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Media already in user's watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: TMDB service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags: [User Media]
      operationId: getMediaForUser
      summary: Get all watchlist items for a user
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Watchlist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WatchlistItem"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [User Media]
      operationId: deleteMediaForUser
      summary: Remove a watchlist item for a user
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserMediaRequest"
      responses:
        "200":
          description: Media removed
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User or media not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string

    UserMediaRequest:
      type: object
      required:
        - tmdbId
        - mediaType
      properties:
        tmdbId:
          type: integer
          format: int64
        mediaType:
          $ref: "#/components/schemas/MediaType"

    MediaType:
      type: string
      enum: [MOVIE, TV]

    UserMedia:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user:
          $ref: "#/components/schemas/User"
        tmdbId:
          type: integer
          format: int64
        watched:
          type: boolean
        personalRating:
          type: number
          format: double
          nullable: true
        watchDate:
          type: string
          format: date
          nullable: true
        mediaType:
          $ref: "#/components/schemas/MediaType"

    Trailer:
      type: object
      properties:
        key:
          type: string
          description: Video ID on the hosting platform (e.g. YouTube video ID)
        name:
          type: string
          description: Title of the trailer
        site:
          type: string
          description: Hosting platform (e.g. YouTube)

    Movie:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        overview:
          type: string
        releaseDate:
          type: string
          format: date
        posterPath:
          type: string
          nullable: true
        backdropPath:
          type: string
          nullable: true
        voteAverage:
          type: number
          format: double

    TvShow:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        overview:
          type: string
        firstAirDate:
          type: string
          format: date
        posterPath:
          type: string
          nullable: true
        backdropPath:
          type: string
          nullable: true
        voteAverage:
          type: number
          format: double

    SearchResult:
      oneOf:
        - $ref: "#/components/schemas/MovieSearchResult"
        - $ref: "#/components/schemas/TvShowSearchResult"
      discriminator:
        propertyName: mediaType
        mapping:
          movie: "#/components/schemas/MovieSearchResult"
          tv: "#/components/schemas/TvShowSearchResult"

    MovieSearchResult:
      type: object
      required:
        - id
        - mediaType
      properties:
        id:
          type: integer
          format: int64
        mediaType:
          type: string
          enum: [movie]
        title:
          type: string
        releaseDate:
          type: string
          format: date
          nullable: true
        posterPath:
          type: string
          nullable: true
        voteAverage:
          type: number
          format: double

    TvShowSearchResult:
      type: object
      required:
        - id
        - mediaType
      properties:
        id:
          type: integer
          format: int64
        mediaType:
          type: string
          enum: [tv]
        name:
          type: string
        firstAirDate:
          type: string
          format: date
          nullable: true
        posterPath:
          type: string
          nullable: true
        voteAverage:
          type: number
          format: double

    WatchlistItem:
      oneOf:
        - $ref: "#/components/schemas/MovieWatchlistItem"
        - $ref: "#/components/schemas/TvShowWatchlistItem"
      discriminator:
        propertyName: mediaType
        mapping:
          MOVIE: "#/components/schemas/MovieWatchlistItem"
          TV: "#/components/schemas/TvShowWatchlistItem"

    MovieWatchlistItem:
      type: object
      required:
        - userMediaId
        - id
        - mediaType
      properties:
        userMediaId:
          type: integer
          format: int64
        id:
          type: integer
          format: int64
        mediaType:
          type: string
          enum: [MOVIE]
        title:
          type: string
        overview:
          type: string
        releaseDate:
          type: string
          format: date
          nullable: true
        posterPath:
          type: string
          nullable: true
        backdropPath:
          type: string
          nullable: true
        voteAverage:
          type: number
          format: double

    TvShowWatchlistItem:
      type: object
      required:
        - userMediaId
        - id
        - mediaType
      properties:
        userMediaId:
          type: integer
          format: int64
        id:
          type: integer
          format: int64
        mediaType:
          type: string
          enum: [TV]
        name:
          type: string
        overview:
          type: string
        firstAirDate:
          type: string
          format: date
          nullable: true
        posterPath:
          type: string
          nullable: true
        backdropPath:
          type: string
          nullable: true
        voteAverage:
          type: number
          format: double
